app = "us-stock-trading-app"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
